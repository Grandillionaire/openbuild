<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Primary Meta Tags -->
    <title>OpenBuild - Visual Website Builder</title>
    <meta name="title" content="OpenBuild - Visual Website Builder">
    <meta name="description" content="Open source drag-and-drop website builder. Create beautiful websites without coding.">
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#7c3aed">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="OpenBuild">
    <link rel="manifest" href="/manifest.json">
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192x192.png">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://openbuild-five.vercel.app/">
    <meta property="og:title" content="OpenBuild - Visual Website Builder">
    <meta property="og:description" content="Open source drag-and-drop website builder. Create beautiful websites without coding.">
    <meta property="og:image" content="/PreviewOpenBuild.jpg">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://openbuild-five.vercel.app/">
    <meta property="twitter:title" content="OpenBuild - Visual Website Builder">
    <meta property="twitter:description" content="Open source drag-and-drop website builder. Create beautiful websites without coding.">
    <meta property="twitter:image" content="/PreviewOpenBuild.jpg">
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
    
    <!-- Register Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('SW registered:', registration.scope);
            })
            .catch((error) => {
              console.log('SW registration failed:', error);
            });
        });
      }
    </script>
  </body>
</html>
